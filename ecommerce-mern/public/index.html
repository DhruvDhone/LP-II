<!DOCTYPE html>
<html>
<head>
    <title>CloudCart E-Commerce</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            background: #f3f6fb;
            color: #222;
        }

        header {
            background: linear-gradient(135deg, #111827, #2563eb);
            color: white;
            padding: 25px;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 34px;
        }

        header p {
            margin-top: 8px;
            font-size: 16px;
        }

        .container {
            width: 92%;
            margin: 25px auto;
        }

        .layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 25px;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            overflow: hidden;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card img {
            width: 100%;
            height: 170px;
            object-fit: cover;
        }

        .card-content {
            padding: 15px;
        }

        .card h3 {
            margin: 0;
            color: #111827;
        }

        .category {
            font-size: 13px;
            color: #2563eb;
            font-weight: bold;
            margin-top: 5px;
        }

        .price {
            font-size: 20px;
            color: #16a34a;
            font-weight: bold;
            margin: 10px 0;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }

        button:hover {
            background: #1d4ed8;
        }

        .cart {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            position: sticky;
            top: 20px;
        }

        .cart h2 {
            margin-top: 0;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #ddd;
            padding: 8px 0;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        .total {
            font-size: 20px;
            font-weight: bold;
            margin: 15px 0;
            color: #16a34a;
        }

        .message {
            margin-top: 12px;
            font-weight: bold;
            color: #2563eb;
        }

        .orders {
            margin-top: 30px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        th {
            background: #111827;
            color: white;
        }

        @media(max-width: 800px) {
            .layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <header>
        <h1>CloudCart</h1>
        <p>Full Stack MERN E-Commerce Web Application on AWS EC2</p>
    </header>

    <div class="container">
        <div class="layout">
            <div>
                <h2>Products</h2>
                <div class="products" id="products"></div>
            </div>

            <div class="cart">
                <h2>Shopping Cart</h2>
                <div id="cartItems"></div>

                <div class="total">
                    Total: Rs. <span id="total">0</span>
                </div>

                <input type="text" id="customerName" placeholder="Enter customer name">
                <input type="email" id="customerEmail" placeholder="Enter email address">

                <button onclick="placeOrder()">Place Order</button>

                <div class="message" id="message"></div>
            </div>
        </div>

        <div class="orders">
            <h2>Recent Orders</h2>
            <button onclick="loadOrders()">Refresh Orders</button>

            <table>
                <thead>
                    <tr>
                        <th>Customer</th>
                        <th>Email</th>
                        <th>Items</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody id="ordersTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        let cart = [];

        async function loadProducts() {
            const response = await fetch("/api/products");
            const products = await response.json();

            const productsDiv = document.getElementById("products");
            productsDiv.innerHTML = "";

            products.forEach(product => {
                productsDiv.innerHTML += `
                    <div class="card">
                        <img src="${product.image}" alt="${product.name}">
                        <div class="card-content">
                            <h3>${product.name}</h3>
                            <div class="category">${product.category}</div>
                            <p>${product.description}</p>
                            <div class="price">Rs. ${product.price}</div>
                            <button onclick='addToCart(${JSON.stringify(product)})'>Add to Cart</button>
                        </div>
                    </div>
                `;
            });
        }

        function addToCart(product) {
            cart.push(product);
            displayCart();
        }

        function displayCart() {
            const cartItems = document.getElementById("cartItems");
            const totalSpan = document.getElementById("total");

            cartItems.innerHTML = "";
            let total = 0;

            cart.forEach((item, index) => {
                total += item.price;

                cartItems.innerHTML += `
                    <div class="cart-item">
                        <span>${item.name}</span>
                        <span>Rs. ${item.price}</span>
                    </div>
                `;
            });

            totalSpan.innerText = total;
        }

        async function placeOrder() {
            const customerName = document.getElementById("customerName").value;
            const customerEmail = document.getElementById("customerEmail").value;
            const totalAmount = cart.reduce((sum, item) => sum + item.price, 0);

            if (customerName === "" || customerEmail === "") {
                document.getElementById("message").innerText = "Please enter customer details.";
                return;
            }

            if (cart.length === 0) {
                document.getElementById("message").innerText = "Cart is empty.";
                return;
            }

            const response = await fetch("/api/orders", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    customerName,
                    customerEmail,
                    items: cart,
                    totalAmount
                })
            });

            const result = await response.json();

            document.getElementById("message").innerText = result.message;

            cart = [];
            displayCart();

            document.getElementById("customerName").value = "";
            document.getElementById("customerEmail").value = "";

            loadOrders();
        }

        async function loadOrders() {
            const response = await fetch("/api/orders");
            const orders = await response.json();

            const ordersTable = document.getElementById("ordersTable");
            ordersTable.innerHTML = "";

            orders.forEach(order => {
                ordersTable.innerHTML += `
                    <tr>
                        <td>${order.customerName}</td>
                        <td>${order.customerEmail}</td>
                        <td>${order.items.length}</td>
                        <td>Rs. ${order.totalAmount}</td>
                    </tr>
                `;
            });
        }

        loadProducts();
        loadOrders();
    </script>
</body>
</html>
