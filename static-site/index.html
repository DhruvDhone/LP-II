<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Static Website</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>My Static Website on AWS EC2</h1>
    <p>Successfully hosted on a cloud virtual machine</p>
    <button onclick="showMessage()">Click Me</button>

  </header>

  <section class="cards">
    <div class="card">
      <h2>Cloud Hosted</h2>

      <h2>Public Access</h2>
      <p>The site is reachable through the public IP address.</p>
    </div>
    <div class="card">
      <h2>Remote Updates</h2>
      <p>Files can be updated remotely using SSH and SCP.</p>
    </div>

  <footer>
    <p>Created by Dhruv</p>
  </footer>

  <script src="script.js"></script>
