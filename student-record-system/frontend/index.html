<!DOCTYPE html>
<html>
<head>
    <title>Student Record Management System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef3f8;
            margin: 0;
            padding: 0;
        }

        header {
            background: #1e3a8a;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container {
            width: 90%;
            margin: 30px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px #aaa;
        }

        input {
            padding: 10px;
            margin: 8px;
            width: 180px;
            border: 1px solid #999;
            border-radius: 5px;
        }

        button {
            padding: 10px 15px;
            margin: 8px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: #1e3a8a;
            color: white;
        }

        button:hover {
            background: #10245c;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
        }

        th, td {
            border: 1px solid #999;
            padding: 10px;
            text-align: center;
        }

        th {
            background: #1e3a8a;
            color: white;
        }

        .delete-btn {
            background: #dc2626;
        }

        .edit-btn {
            background: #16a34a;
        }
    </style>
</head>
<body>

<header>
    <h1>Cloud-Based Student Record Management System</h1>
</header>

<div class="container">
    <h2>Add / Update Student</h2>

    <input type="hidden" id="studentId">

    <input type="text" id="name" placeholder="Student Name">
    <input type="text" id="roll_no" placeholder="Roll Number">
    <input type="text" id="department" placeholder="Department">
    <input type="email" id="email" placeholder="Email">
    <input type="text" id="phone" placeholder="Phone">

    <button onclick="saveStudent()">Save Student</button>
    <button onclick="clearForm()">Clear</button>

    <h2>Student Records</h2>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Roll No</th>
                <th>Department</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="studentTable"></tbody>
    </table>
</div>

<script>
    const API_URL = "/api/students";

    function loadStudents() {
        fetch(API_URL)
            .then(response => response.json())
            .then(data => {
                let table = document.getElementById("studentTable");
                table.innerHTML = "";

                data.forEach(student => {
                    table.innerHTML += `
                        <tr>
                            <td>${student.id}</td>
                            <td>${student.name}</td>
                            <td>${student.roll_no}</td>
                            <td>${student.department}</td>
                            <td>${student.email}</td>
                            <td>${student.phone}</td>
                            <td>
                                <button class="edit-btn" onclick='editStudent(${JSON.stringify(student)})'>Edit</button>
                                <button class="delete-btn" onclick="deleteStudent(${student.id})">Delete</button>
                            </td>
                        </tr>
                    `;
                });
            });
    }

    function saveStudent() {
        let id = document.getElementById("studentId").value;

        let student = {
            name: document.getElementById("name").value,
            roll_no: document.getElementById("roll_no").value,
            department: document.getElementById("department").value,
            email: document.getElementById("email").value,
            phone: document.getElementById("phone").value
        };

        if (id === "") {
            fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(student)
            })
            .then(response => response.json())
            .then(() => {
                clearForm();
                loadStudents();
            });
        } else {
            fetch(`${API_URL}/${id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(student)
            })
            .then(response => response.json())
            .then(() => {
                clearForm();
                loadStudents();
            });
        }
    }

    function editStudent(student) {
        document.getElementById("studentId").value = student.id;
        document.getElementById("name").value = student.name;
        document.getElementById("roll_no").value = student.roll_no;
        document.getElementById("department").value = student.department;
        document.getElementById("email").value = student.email;
        document.getElementById("phone").value = student.phone;
    }

    function deleteStudent(id) {
        fetch(`${API_URL}/${id}`, {
            method: "DELETE"
        })
        .then(response => response.json())
        .then(() => loadStudents());
    }

    function clearForm() {
        document.getElementById("studentId").value = "";
        document.getElementById("name").value = "";
        document.getElementById("roll_no").value = "";
        document.getElementById("department").value = "";
        document.getElementById("email").value = "";
        document.getElementById("phone").value = "";
    }

    loadStudents();
</script>

</body>
</html>
<!--
AWS DEPLOYMENT STEPS
Cloud-Based Student Record Management System

Project folder on laptop:
~/Downloads/student-record-system

Folder structure:
student-record-system
├── backend
│   ├── package.json
│   └── server.js

Step 1: Create AWS EC2 instance

Open AWS Console and go to EC2.

Click Launch Instance.

Enter instance name:

student-record-system

Select AMI:

Ubuntu

Select instance type:

t2.micro or t3.micro

Select existing key pair or create a new key pair.

In Security Group, add these inbound rules:

SSH
Port: 22
Source: My IP

HTTP
Port: 80
Source: 0.0.0.0/0

Custom TCP
Port: 5000
Source: 0.0.0.0/0

Launch the instance.

After launching, copy the Public IPv4 address of the instance.

Step 2: Connect to AWS instance from laptop

Open terminal on laptop.

Go to Downloads folder:

cd ~/Downloads

Give permission to key file:

chmod 400 your-key.pem

Connect to AWS instance:

ssh -i your-key.pem ubuntu@YOUR_EC2_PUBLIC_IP

Example:

ssh -i website-key.pem ubuntu@3.91.30.11

Step 3: Install required software on AWS Ubuntu

Run these commands on AWS instance:

sudo apt update

sudo apt install nodejs npm nginx -y

Check versions:

node -v

npm -v

nginx -v

Step 4: Copy project from laptop Downloads to AWS instance

Open a new terminal on laptop.

Do not close the AWS terminal.

Run this command from laptop:

scp -i ~/Downloads/your-key.pem -r ~/Downloads/student-record-system ubuntu@YOUR_EC2_PUBLIC_IP:/home/ubuntu/

Example:

scp -i ~/Downloads/website-key.pem -r ~/Downloads/student-record-system ubuntu@3.91.30.11:/home/ubuntu/

Step 5: Check project on AWS

Go back to AWS terminal.

Run:

cd ~

ls

cd student-record-system

ls

You should see:

backend frontend

Check backend folder:

ls backend

You should see:

package.json server.js

Check frontend folder:

ls frontend

You should see:

index.html

Step 6: Install backend dependencies

Run on AWS terminal:

cd ~/student-record-system/backend

npm install

Step 7: Start backend server temporarily

Run:

node server.js

You should see:

Server running on port 5000

Keep this terminal open for now.

Step 8: Open second AWS terminal

Open another terminal on laptop and connect again:

cd ~/Downloads

ssh -i your-key.pem ubuntu@YOUR_EC2_PUBLIC_IP

ssh -i website-key.pem ubuntu@3.91.30.11

Step 9: Copy frontend to Nginx web root

Run in second AWS terminal:

sudo rm -rf /var/www/html/*

sudo cp ~/student-record-system/frontend/index.html /var/www/html/

Check:

ls /var/www/html

You should see:

index.html

Step 10: Configure Nginx reverse proxy

Run:

sudo nano /etc/nginx/sites-available/default

Delete the old content and paste this:

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /var/www/html;
    index index.html;

    server_name _;

    location / {
        try_files $uri $uri/ =404;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:5000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}

Save the file:

CTRL + O
Enter
CTRL + X

Step 11: Restart Nginx

Run:

sudo nginx -t

sudo systemctl restart nginx

sudo systemctl status nginx

If it shows active running, it is correct.

Press q to exit the status screen.
