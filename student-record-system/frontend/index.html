<!DOCTYPE html>
<html>
<head>
    <title>Student Record Management System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef3f8;
            margin: 0;
            padding: 0;
        }

        header {
            background: #1e3a8a;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container {
            width: 90%;
            margin: 30px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px #aaa;
        }

        input {
            padding: 10px;
            margin: 8px;
            width: 180px;
            border: 1px solid #999;
            border-radius: 5px;
        }

        button {
            padding: 10px 15px;
            margin: 8px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: #1e3a8a;
            color: white;
        }

        button:hover {
            background: #10245c;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
        }

        th, td {
            border: 1px solid #999;
            padding: 10px;
            text-align: center;
        }

        th {
            background: #1e3a8a;
            color: white;
        }

        .delete-btn {
            background: #dc2626;
        }

        .edit-btn {
            background: #16a34a;
        }
    </style>
</head>
<body>

<header>
    <h1>Cloud-Based Student Record Management System</h1>
</header>

<div class="container">
    <h2>Add / Update Student</h2>

    <input type="hidden" id="studentId">

    <input type="text" id="name" placeholder="Student Name">
    <input type="text" id="roll_no" placeholder="Roll Number">
    <input type="text" id="department" placeholder="Department">
    <input type="email" id="email" placeholder="Email">
    <input type="text" id="phone" placeholder="Phone">

    <button onclick="saveStudent()">Save Student</button>
    <button onclick="clearForm()">Clear</button>

    <h2>Student Records</h2>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Roll No</th>
                <th>Department</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="studentTable"></tbody>
    </table>
</div>

<script>
    const API_URL = "/api/students";

    function loadStudents() {
        fetch(API_URL)
            .then(response => response.json())
            .then(data => {
                let table = document.getElementById("studentTable");
                table.innerHTML = "";

                data.forEach(student => {
                    table.innerHTML += `
                        <tr>
                            <td>${student.id}</td>
                            <td>${student.name}</td>
                            <td>${student.roll_no}</td>
                            <td>${student.department}</td>
                            <td>${student.email}</td>
                            <td>${student.phone}</td>
                            <td>
                                <button class="edit-btn" onclick='editStudent(${JSON.stringify(student)})'>Edit</button>
                                <button class="delete-btn" onclick="deleteStudent(${student.id})">Delete</button>
                            </td>
                        </tr>
                    `;
                });
            });
    }

    function saveStudent() {
        let id = document.getElementById("studentId").value;

        let student = {
            name: document.getElementById("name").value,
            roll_no: document.getElementById("roll_no").value,
            department: document.getElementById("department").value,
            email: document.getElementById("email").value,
            phone: document.getElementById("phone").value
        };

        if (id === "") {
            fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(student)
            })
            .then(response => response.json())
            .then(() => {
                clearForm();
                loadStudents();
            });
        } else {
            fetch(`${API_URL}/${id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(student)
            })
            .then(response => response.json())
            .then(() => {
                clearForm();
                loadStudents();
            });
        }
    }

    function editStudent(student) {
        document.getElementById("studentId").value = student.id;
        document.getElementById("name").value = student.name;
        document.getElementById("roll_no").value = student.roll_no;
        document.getElementById("department").value = student.department;
        document.getElementById("email").value = student.email;
        document.getElementById("phone").value = student.phone;
    }

    function deleteStudent(id) {
        fetch(`${API_URL}/${id}`, {
            method: "DELETE"
        })
        .then(response => response.json())
        .then(() => loadStudents());
    }

    function clearForm() {
        document.getElementById("studentId").value = "";
        document.getElementById("name").value = "";
        document.getElementById("roll_no").value = "";
        document.getElementById("department").value = "";
        document.getElementById("email").value = "";
        document.getElementById("phone").value = "";
    }

    loadStudents();
</script>

</body>
</html>
